name: CD — Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── PREVIEW DEPLOY (every PR) ──────────────────────────────────
  preview:
    name: Preview Deployment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🚀 Preview Deployment Ready\n\n**URL:** ${{ steps.deploy.outputs.url }}\n**Commit:** \`${{ github.sha }}\`\n**Branch:** \`${{ github.head_ref }}\``
            })

  # ─── PRODUCTION DEPLOY (main only, waits for CI gate) ───────────
  deploy:
    name: Deploy (Production)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - name: Wait for CI to succeed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Production Build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

      - name: Rollback on deploy failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back to last successful deployment"
          LAST=$(vercel ls --token=${{ secrets.VERCEL_TOKEN }} --prod 2>/dev/null | grep "Ready" | sed -n '2p' | awk '{print $2}')
          if [ -n "$LAST" ]; then
            vercel rollback "$LAST" --token=${{ secrets.VERCEL_TOKEN }}
            echo "Rolled back to $LAST"
          else
            echo "No previous deployment found to roll back to"
          fi
