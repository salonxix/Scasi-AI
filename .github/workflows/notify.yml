name: Notify on Failure

on:
  workflow_run:
    workflows: ["CI", "CD — Deploy to Vercel"]
    types: [completed]
    branches: [main]

jobs:
  notify:
    name: Notify on CI/CD Failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Post failure issue on main branch break
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = context.payload.workflow_run;
            const title = `🚨 ${workflow.name} failed on \`main\``;
            const body = [
              `## CI/CD Pipeline Failure`,
              ``,
              `**Workflow:** ${workflow.name}`,
              `**Branch:** \`${workflow.head_branch}\``,
              `**Commit:** \`${workflow.head_sha.slice(0, 7)}\``,
              `**Triggered by:** @${workflow.triggering_actor.login}`,
              `**Run URL:** ${workflow.html_url}`,
              ``,
              `Please investigate and fix before merging further changes.`,
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });

            const alreadyOpen = issues.data.some(i => i.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }
